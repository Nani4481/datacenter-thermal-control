name: datacenter-thermal-control
version: "1.0.0"
description: >
  Hyperscale AI data center thermal and power controller.
  Agent manages HVAC cooling and GPU workload distribution
  to minimize PUE while preventing thermal shutdowns.
tags:
  - openenv
  - thermal-control
  - scheduling
  - real-world
api:
  base_url: http://localhost:7860
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
tasks:
  - name: easy
    description: >
      Steady-state optimization. All systems operational, balanced 50% load.
      Goal: reduce HVAC output to achieve PUE <= 1.25 without thermal violations.
    max_steps: 10
    success_threshold: 0.5
  - name: medium
    description: >
      Load surge event. R0 is at 100% workload and 75°C. Others idle.
      Goal: redistribute load to eliminate hot spot and balance all racks.
    max_steps: 15
    success_threshold: 0.4
  - name: hard
    description: >
      HVAC failure emergency. H0 (cooling R0 and R1) has failed.
      R0 and R1 at 70°C with 80% load and zero cooling.
      Goal: evacuate all workload from failed racks before thermal shutdown.
    max_steps: 10
    success_threshold: 0.4
observation_space:
  type: object
  description: "DataCenterObservation — rack temps, HVAC states, PUE, imbalance"
action_space:
  type: object
  description: "DataCenterAction — hvac_adjustments, workload_shifts, throttles"